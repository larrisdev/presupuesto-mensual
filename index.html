<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto Mensual</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <a class="skip-link" href="#contenido-principal">Ir al contenido</a>

    <div class="container">

        <header class="header">

            <h1 id="mesActual">Presupuesto de 2026</h1>

            <h2 id="presupuestoTotal">+ 0.00</h2>

            <div class="resumen">

                <div class="ingresos">
                    <span>INGRESOS:</span>
                    <span id="totalIngresos">+ 0.00</span>
                </div>

                <div class="egresos">
                    <span>EGRESOS:</span>
                    <span id="totalEgresos">- 0.00</span>
                </div>

            </div>

            <p class="porcentaje-linea">Porcentaje de gastos: <span id="porcentajeGastos" class="badge-porcentaje">0.00%</span></p>

        </header>


        <main id="contenido-principal" class="contenido">

            <section class="formulario" aria-labelledby="titulo-transaccion">

                <h3 id="titulo-transaccion">Transacción</h3>

                <select id="tipo" aria-label="Tipo de transacción">
                    <option value="ingreso">Ingreso</option>
                    <option value="egreso">Egreso</option>
                </select>

                <input 
                    type="text" 
                    id="descripcion" 
                    placeholder="Descripción"
                    autocomplete="off">

                <input 
                    type="text" 
                    inputmode="decimal" 
                    id="monto" 
                    placeholder="Monto"
                    autocomplete="off">

                <p id="formularioError" class="formulario-error" role="alert" hidden></p>

                <button type="button" id="btnAgregar">
                    Agregar
                </button>

            </section>

            <section class="listado">

                <div class="tabs" role="tablist" aria-label="Detalle por tipo">

                    <button type="button" id="tabIngresos" class="activo" role="tab" aria-selected="true">
                        Ingresos
                    </button>

                    <button type="button" id="tabEgresos" role="tab" aria-selected="false">
                        Egresos
                    </button>

                </div>

                <div id="listaTransacciones" aria-live="polite">

                </div>

            </section>

        </main>

    </div>


    <script type="module" src="js/app.js"></script>

</body>
</html>
